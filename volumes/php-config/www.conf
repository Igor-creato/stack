; ═══════════════════════════════════════════
; PHP-FPM Pool — Production
; Target: 1000 UV/day, peak 50-100 concurrent
; ═══════════════════════════════════════════

[www]

listen = 0.0.0.0:9000 ; TCP для Nginx → PHP-FPM
; ── Process Manager ──
; static — все воркеры живут постоянно, нет overhead на fork/kill
; 16 воркеров × ~40-50MB = ~640-800MB RAM
pm = dynamic
pm.max_children = 8
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Recycle воркеров каждые 500 запросов
; Защита от memory leaks (WooCommerce плагины текут)
pm.max_requests = 500

; ── Status & Monitoring ──
pm.status_path = /fpm-status
pm.status_listen = 0.0.0.0:9001

; ── Slow Log ──
; Логировать запросы дольше 5 сек (для диагностики)
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

; Убить запрос через 120 сек (защита от зависших скриптов)
request_terminate_timeout = 300s

; ── Environment ──
clear_env = no

; ── Limits ──
rlimit_files = 8192
rlimit_core = 0

; ── Error logging ──
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /proc/self/fd/2

; ── Security ──
; Запретить выполнение опасных функций
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,curl_multi_exec,parse_ini_file,show_source,pcntl_exec
