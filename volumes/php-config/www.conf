; ═══════════════════════════════════════════
; PHP-FPM Pool — Production
; Target: 1000 UV/day, peak 50-100 concurrent
; ═══════════════════════════════════════════

[www]

listen = 0.0.0.0:9000

; ── Process Manager ──
pm = dynamic
pm.max_children = 8
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; ── Status & Monitoring ──
pm.status_path = /fpm-status
pm.status_listen = 0.0.0.0:9001

; ── Slow Log — ОТКЛЮЧАЕМ ──
; В production-режиме slowlog не нужен, он только создаёт нагрузку
; и вызывает ошибки ptrace в контейнерах
;slowlog = /var/log/php-fpm-slow.log
;request_slowlog_timeout = 0

; ── Таймауты ──
request_terminate_timeout = 120s

; ── Environment ──
clear_env = no

; ── Limits ──
rlimit_files = 8192
rlimit_core = 0

; ── Error logging ──
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /proc/self/fd/2

; ── Security ──
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,curl_multi_exec,parse_ini_file,show_source,pcntl_exec