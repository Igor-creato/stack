# ══════════════════════════════════════════════
# Контейнер упал — wordpress
# ══════════════════════════════════════════════
alarm: container_wordpress_down
   on: docker_local.container_wordpress_state
lookup: max -60s unaligned of running
  calc: $this == 0 ? 1 : 0
 units: status
 every: 30s
  warn: $this > 0
 delay: down 2m multiplier 1 max 10m
summary: Контейнер wordpress упал
   info: Контейнер wordpress не запущен
     to: telegram

