alarm: container_wordpress_unhealthy
   on: docker_local.container_wordpress_health_status
lookup: max -60s unaligned of unhealthy
  calc: $this
 units: status
 every: 30s
  warn: $this > 0
 delay: down 5m multiplier 1 max 15m
summary: Healthcheck wordpress падает
   info: Healthcheck контейнера wordpress не проходит
     to: telegram

