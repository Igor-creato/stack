# ══════════════════════════════
# CPU хоста
# ══════════════════════════════
alarm: host_cpu_warning
   on: system.cpu
   lookup: average -10m unaligned of user,system,softirq,irq,iowait
    calc: $this
   units: %
   every: 1m
    warn: $this > 75
    crit: $this > 90
   delay: down 15m multiplier 1.5 max 1h
 summary: Высокая загрузка CPU сервера
    info: CPU загружен на ${alarm_value}% (warn>75%, crit>90%). \
          Рассмотрите увеличение ресурсов.
      to: telegram

# ══════════════════════════════
# RAM хоста
# ══════════════════════════════
alarm: host_ram_warning
   on: system.ram
   lookup: average -5m unaligned of used
    calc: $this * 100 / ($used + $free + $cached + $buffers)
   units: %
   every: 1m
    warn: $this > 80
    crit: $this > 92
   delay: down 10m multiplier 1.5 max 1h
 summary: Высокое использование RAM
    info: RAM использована на ${alarm_value}%. \
          При >92% сервер начнёт использовать swap и деградирует.
      to: telegram

# ══════════════════════════════
# Диск — корневой раздел
# ══════════════════════════════
alarm: host_disk_space_warning
   on: disk_space._
   lookup: average -5m unaligned of used
    calc: $this * 100 / ($avail + $used)
   units: %
   every: 5m
    warn: $this > 75
    crit: $this > 90
   delay: down 1h multiplier 1 max 6h
 summary: Мало места на диске
    info: Диск заполнен на ${alarm_value}%. \
          При 100% Docker и базы данных начнут падать.
      to: telegram

# ══════════════════════════════
# Disk I/O — предвестник перегрузки
# ══════════════════════════════
alarm: host_disk_iops_warning
   on: system.io
   lookup: average -10m unaligned of in,out
    calc: abs($this)
   units: KiB/s
   every: 2m
    warn: $this > 50000
    crit: $this > 100000
   delay: down 20m multiplier 1 max 2h
 summary: Высокая нагрузка на диск
    info: Disk I/O ${alarm_value} KiB/s. Возможна деградация баз данных.
      to: telegram

# ══════════════════════════════
# Swap — критический сигнал
# ══════════════════════════════
alarm: host_swap_warning
   on: system.swap
   lookup: average -5m unaligned of used
    calc: $this
   units: MiB
   every: 1m
    warn: $this > 100
    crit: $this > 500
   delay: down 10m multiplier 1 max 1h
 summary: Сервер использует swap
    info: Используется ${alarm_value} MiB swap. \
          Это признак нехватки RAM — сервер под давлением.
      to: telegram

# ══════════════════════════════
# Сетевые соединения
# ══════════════════════════════
alarm: host_tcp_connections
   on: ipv4.tcpsock
   lookup: average -5m unaligned
    calc: $this
   units: connections
   every: 2m
    warn: $this > 500
    crit: $this > 1000
   delay: down 15m multiplier 1 max 1h
 summary: Много TCP соединений
    info: Активных TCP соединений: ${alarm_value}. \
          Возможна DDoS-атака или утечка соединений.
      to: telegram