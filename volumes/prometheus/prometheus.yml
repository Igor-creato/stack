global:
  scrape_interval: 30s
  evaluation_interval: 30s

remote_write:
  - url: https://prometheus-prod-XX-XXX.grafana.net/api/prom/push
    basic_auth:
      username: 'ВАШ_INSTANCE_ID'
      password: 'ВАШ_API_KEY'

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082'] # metrics endpoint

  - job_name: redis_wp
    static_configs:
      - targets: ['redis-exporter:9121']
