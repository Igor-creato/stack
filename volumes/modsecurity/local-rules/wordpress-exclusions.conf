# ═══════════════════════════════════════════════════════════
#  WordPress-специфичные исключения для OWASP CRS
#  Подключается через bind-mount в /etc/modsecurity.d/local-rules/
#  Использует ctl:ruleRemoveById с условием по REQUEST_URI,
#  а не голый SecRuleRemoveById (тот сносит правило глобально).
# ═══════════════════════════════════════════════════════════

# ── /wp-admin: формы и AJAX ────────────────────────────────
# 920420 — Request content type not allowed (multipart/JSON в админке)
# 932100 — Remote Command Execution: Unix Command Injection
# 932105 — Remote Command Execution: Unix Command Injection (vars)
# 941100 — XSS Filter (часто срабатывает на встроенный TinyMCE)
SecRule REQUEST_URI "@beginsWith /wp-admin" \
    "id:1001,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920420,\
     ctl:ruleRemoveById=932100,\
     ctl:ruleRemoveById=932105,\
     ctl:ruleRemoveTargetById=941100;ARGS:content,\
     ctl:ruleRemoveTargetById=941100;ARGS:excerpt"

# ── wp-cron.php — внутренний триггер ──────────────────────
# 949110 — Inbound Anomaly Score Exceeded (он триггерится из-за UA "WordPress")
# 980130 — Inbound Anomaly Score (final summary rule)
SecRule REQUEST_URI "@beginsWith /wp-cron.php" \
    "id:1002,phase:1,pass,nolog,\
     ctl:ruleRemoveById=949110,\
     ctl:ruleRemoveById=980130"

# ── /wp-json (REST API): таргетированные исключения ───────
# 941160 — NoScript XSS InjectionChecker (срабатывает на HTML из Gutenberg)
# Удаляем ТОЛЬКО для контентных полей, остальные — продолжают защищаться
SecRule REQUEST_URI "@beginsWith /wp-json" \
    "id:1003,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetById=941160;ARGS:content,\
     ctl:ruleRemoveTargetById=941160;ARGS:excerpt,\
     ctl:ruleRemoveTargetById=932150;ARGS:content"

# ── xmlrpc.php — подавление шума при сканах ───────────────
# (XMLRPC де-факто заблокирован на nginx-уровне в default.conf)
# 920273, 921110 — request smuggling / header injection (часто ложные)
SecRule REQUEST_URI "@beginsWith /xmlrpc.php" \
    "id:1004,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920273,\
     ctl:ruleRemoveById=921110"

# ── Известные технические заголовки WP HEARTBEAT ──────────
# WP heartbeat шлёт сериализованные данные, ловится на 932xxx
SecRule REQUEST_URI "@contains admin-ajax.php" \
    "id:1005,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetById=932150;ARGS:data,\
     ctl:ruleRemoveTargetById=941100;ARGS:data"

# ── /wp-login.php — НЕ писать тело запроса в audit log ────
# Защита от утечки пароля пользователя в modsec_audit.log → Vector → VictoriaLogs.
# auditLogParts=-C  — убирает request body (часть C);
# requestBodyAccess=Off — modsec не парсит тело, правила тела не сработают на login,
# что приемлемо: брутфорс пароля ловится на уровне Traefik wp-bruteforce middleware
# и/или CrowdSec по nginx access log. Аудит остаётся для headers/URI/response status.
SecRule REQUEST_URI "@beginsWith /wp-login.php" \
    "id:1010,phase:1,pass,nolog,\
     ctl:auditLogParts=-C,\
     ctl:requestBodyAccess=Off"
