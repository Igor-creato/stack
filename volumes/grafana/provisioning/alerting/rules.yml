apiVersion: 1

groups:
  - orgId: 1
    name: server-alerts
    folder: Alerts
    interval: 1m
    rules:
      # ================= HOST =================

      - uid: ram-low
        title: 'Low RAM'
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics-uid
            model:
              expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes
              instant: true
          - refId: C
            datasourceUid: '__expr__'
            model:
              expression: A
              conditions:
                - evaluator: { type: lt, params: [0.1] }
                  reducer: { type: last }
              type: threshold
        for: 3m
        labels: { severity: warning }

      - uid: cpu-high
        title: 'CPU core overloaded'
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics-uid
            model:
              expr: 1 - min(rate(node_cpu_seconds_total{mode="idle"}[2m]))
              instant: true
          - refId: C
            datasourceUid: '__expr__'
            model:
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.9] }
                  reducer: { type: last }
              type: threshold
        for: 3m
        labels: { severity: warning }

      - uid: disk-low
        title: 'Disk almost full'
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics-uid
            model:
              expr: node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
              instant: true
          - refId: C
            datasourceUid: '__expr__'
            model:
              expression: A
              conditions:
                - evaluator: { type: lt, params: [0.15] }
                  reducer: { type: last }
              type: threshold
        for: 3m
        labels: { severity: critical }

      # ================= CONTAINERS =================

      - uid: container-down
        title: 'Container not updating'
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics-uid
            model:
              expr: time() - container_last_seen{name=~"nginx|wordpress|mariadb|traefik|redis|modsecurity|postback.*"}
              instant: true
          - refId: C
            datasourceUid: '__expr__'
            model:
              expression: A
              conditions:
                - evaluator: { type: gt, params: [60] }
                  reducer: { type: last }
              type: threshold
        for: 2m
        labels: { severity: critical }

      - uid: container-cpu
        title: 'Container CPU high'
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics-uid
            model:
              expr: sum by (container) (rate(container_cpu_usage_seconds_total[2m]))
              instant: true
          - refId: C
            datasourceUid: '__expr__'
            model:
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.7] }
                  reducer: { type: last }
              type: threshold
        for: 3m
        labels: { severity: warning }

      - uid: container-memory-leak
        title: 'Container memory growth'
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics-uid
            model:
              expr: increase(container_memory_usage_bytes[5m])
              instant: true
          - refId: C
            datasourceUid: '__expr__'
            model:
              expression: A
              conditions:
                - evaluator: { type: gt, params: [50000000] } # ~50MB рост за 5м
                  reducer: { type: last }
              type: threshold
        for: 5m
        labels: { severity: warning }

      # ================= CORE =================

      - uid: vm-down
        title: 'VictoriaMetrics down'
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics-uid
            model:
              expr: up{job="victoriametrics"}
              instant: true
          - refId: C
            datasourceUid: '__expr__'
            model:
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }
                  reducer: { type: last }
              type: threshold
        for: 2m
        noDataState: Alerting
        labels: { severity: critical }

      - uid: cadvisor-down
        title: 'cAdvisor down'
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: victoriametrics-uid
            model:
              expr: up{job="cadvisor"}
              instant: true
          - refId: C
            datasourceUid: '__expr__'
            model:
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }
                  reducer: { type: last }
              type: threshold
        for: 2m
        noDataState: Alerting
        labels: { severity: critical }
