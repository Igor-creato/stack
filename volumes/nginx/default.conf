upstream php-fpm {
    server wordpress:9000;
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    # ══════════════════════════════════════════
    # Реальный IP от Traefik
    # ══════════════════════════════════════════
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ══════════════════════════════════════════
    # Healthcheck
    # ══════════════════════════════════════════
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # PHP-FPM status (только внутренний доступ)
    location = /fpm-status {
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ══════════════════════════════════════════
    # Безопасность
    # ══════════════════════════════════════════

    # Запрет листинга директорий
    autoindex off;

    # Скрытые файлы (.git, .env, .htaccess)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # PHP в uploads — главный вектор RCE
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    # xmlrpc — вектор брутфорса и DDoS amplification
    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Чувствительные файлы
    location ~* ^/(readme|license|debug)\.(html|txt|log)$ {
        deny all;
        access_log off;
    }

    # wp-config.php
    location = /wp-config.php {
        deny all;
    }

   # Блокируем install.php (нужен только при первой установке)
    #location = /wp-admin/install.php {
    #    deny all;
    #}

    # wp-includes PHP (кроме необходимых)
    location ~* ^/wp-includes/.*\.php$ {
        deny all;
    }

    # version.php — скрыть версию WordPress
    location ~* /wp-includes/version\.php$ {
        deny all;
    }

    # debug.log — данные об ошибках
    location = /wp-content/debug.log {
        deny all;
    }

    # Чувствительные расширения
    location ~* \.(engine|inc|info|install|make|module|profile|test|po|sh|sql|bak|old|orig|swp|~)$ {
        deny all;
        access_log off;
    }

    # ══════════════════════════════════════════
    # Статика — долгий кэш
    # ══════════════════════════════════════════
    location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg|css|js|woff|woff2|ttf|otf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # ══════════════════════════════════════════
    # Robots / Favicon
    # ══════════════════════════════════════════
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 365d;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        try_files $uri /index.php?$args;
    }

    # ══════════════════════════════════════════
    # WooCommerce REST API
    # ══════════════════════════════════════════
    location ~* ^/wp-json/wc/ {
        client_max_body_size 256M;
        client_body_timeout 300s;
        try_files $uri $uri/ /index.php?$args;
    }

    # WordPress REST API
    location ~* ^/wp-json/ {
        client_max_body_size 256M;
        client_body_timeout 300s;
        try_files $uri $uri/ /index.php?$args;
    }

    # ══════════════════════════════════════════
    # Основной location
    # ══════════════════════════════════════════
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ══════════════════════════════════════════
    # PHP через FastCGI
    # ══════════════════════════════════════════
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;

        # Основные параметры
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # HTTPS за прокси
        fastcgi_param HTTPS "on";
        fastcgi_param HTTP_X_FORWARDED_PROTO "https";

        # Буферы
        fastcgi_buffer_size     32k;
        fastcgi_buffers         16 16k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 256k;

        # Таймауты
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    300s;
        fastcgi_read_timeout    300s;

        # Keepalive к upstream
        fastcgi_keep_conn on;

        # ── FastCGI Cache ──
        set $skip_cache 0;

        if ($skip_cache_uri)    { set $skip_cache 1; }
        if ($skip_cache_cookie) { set $skip_cache 1; }
        if ($skip_cache_method) { set $skip_cache 1; }

        # WooCommerce dynamic params
        if ($arg_add_to_cart != "") { set $skip_cache 1; }
        if ($arg_wc_ajax != "")    { set $skip_cache 1; }

        # ── Партнерские параметры ( Cashback / Admitad / EPN ) ──
        if ($arg_ref != "")        { set $skip_cache 1; }

        fastcgi_cache WOOCOMMERCE;
        fastcgi_cache_valid 200     30m;
        fastcgi_cache_valid 301     1h;
        fastcgi_cache_valid 302     0;     # НЕ кэшировать 302 (партнёрские редиректы!)
        fastcgi_cache_valid 404     1m;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache     $skip_cache;

        fastcgi_cache_use_stale error timeout updating http_500 http_503;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 5s;
        fastcgi_cache_background_update on;
        fastcgi_cache_revalidate on;

        # Debug header (убрать после тестирования)
        add_header X-FastCGI-Cache $upstream_cache_status always;
    }
}
