global:
  scrape_interval: 30s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

    metric_relabel_configs:
      - action: labeldrop
        regex: 'container_label_traefik.*|container_label_org_opencontainers.*|container_label_maintainer'

  - job_name: victoriametrics
    static_configs:
      - targets: ['victoriametrics:8428']

  - job_name: mysqld
    static_configs:
      - targets: ['mysqld-exporter:9104']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: php-fpm
    static_configs:
      - targets: ['php-fpm-exporter:9253']

  - job_name: webhook-worker
    static_configs:
      - targets: ['webhook-worker:9100']
