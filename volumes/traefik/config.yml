# ═══════════════════════════════════════════
# Traefik — Dynamic Configuration
# ═══════════════════════════════════════════

http:
  middlewares:
    # Общие security headers (для использования из config.yml)
    security-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Download-Options: "noopen"
          X-Permitted-Cross-Domain-Policies: "none"

    # Rate limit для webhook-ов партнёрских сетей
    webhook-ratelimit:
      rateLimit:
        average: 700
        burst: 800
        period: 1m

    # Сжатие на уровне Traefik (опционально, основное в nginx)
    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"
