# ═══════════════════════════════════════════════════════════
#  Vector — собирает логи и пушит в VictoriaLogs
#  через ES /_bulk API.
#
#  Источники:
#   - /var/log/nginx/access.log    (формат main, см. nginx.conf)
#   - /var/log/nginx/error.log
#   - /var/log/modsec/modsec_audit.log    (JSON, RelevantOnly)
#   - /var/log/traefik/access.log         (JSON)
#   - PHP-FPM stdout через docker_logs    (фильтр по wordpress)
# ═══════════════════════════════════════════════════════════

[api]
enabled = false

# ── SOURCES ─────────────────────────────────────────────────

[sources.nginx_access]
type = "file"
include = ["/var/log/nginx/access.log"]
read_from = "end"
ignore_older_secs = 86400

[sources.nginx_error]
type = "file"
include = ["/var/log/nginx/error.log"]
read_from = "end"
ignore_older_secs = 86400

[sources.modsec_audit]
type = "file"
include = ["/var/log/modsec/modsec_audit.log"]
read_from = "end"
ignore_older_secs = 86400

[sources.traefik_access]
type = "file"
include = ["/var/log/traefik/*.log"]
read_from = "end"
ignore_older_secs = 86400

[sources.docker_php]
type = "docker_logs"
include_containers = ["wordpress"]

# ── TRANSFORMS (VRL = Vector Remap Language) ────────────────

# nginx access — парсим log_format main
# 1.2.3.4 - - [24/Apr/2026:10:15:22 +0000] "GET /path HTTP/1.1" 200 1234 "ref" "ua" rt=0.045 uct=0.001 uht=0.044 urt=0.044 cache=HIT
[transforms.nginx_access_parsed]
type = "remap"
inputs = ["nginx_access"]
source = '''
parsed, err = parse_regex(.message, r'^(?P<remote_addr>\S+) \S+ \S+ \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) (?P<proto>[^"]+)" (?P<status>\d+) (?P<bytes>\d+) "(?P<referer>[^"]*)" "(?P<user_agent>[^"]*)" rt=(?P<request_time>\S+) uct=(?P<upstream_connect_time>\S+) uht=(?P<upstream_header_time>\S+) urt=(?P<upstream_response_time>\S+) cache=(?P<cache_status>\S+)$')
if err == null {
  .remote_addr = parsed.remote_addr
  .method = parsed.method
  .path = parsed.path
  .status = to_int!(parsed.status)
  .bytes = to_int!(parsed.bytes)
  .referer = parsed.referer
  .user_agent = parsed.user_agent
  .request_time = to_float!(parsed.request_time) ?? 0.0
  .upstream_response_time = to_float(parsed.upstream_response_time) ?? 0.0
  .cache_status = parsed.cache_status
}
.source_type = "nginx_access"
.service = "nginx"
'''

# nginx error — извлекаем уровень
[transforms.nginx_error_parsed]
type = "remap"
inputs = ["nginx_error"]
source = '''
parsed, err = parse_regex(.message, r'^(?P<ts>\S+ \S+) \[(?P<level>\w+)\]')
if err == null {
  .level = parsed.level
}
.source_type = "nginx_error"
.service = "nginx"
'''

# modsec audit — уже JSON, парсим в поля верхнего уровня
[transforms.modsec_parsed]
type = "remap"
inputs = ["modsec_audit"]
source = '''
parsed, err = parse_json(.message)
if err == null {
  . = merge(., parsed) ?? .
}
.source_type = "modsec_audit"
.service = "modsecurity"
'''

# traefik access — уже JSON
[transforms.traefik_parsed]
type = "remap"
inputs = ["traefik_access"]
source = '''
parsed, err = parse_json(.message)
if err == null {
  . = merge(., parsed) ?? .
}
.source_type = "traefik_access"
.service = "traefik"
'''

# php-fpm stdout — детектим уровни PHP
[transforms.php_parsed]
type = "remap"
inputs = ["docker_php"]
source = '''
msg = string(.message) ?? ""
if contains(msg, "PHP Fatal") {
  .level = "fatal"
} else if contains(msg, "PHP Warning") {
  .level = "warning"
} else if contains(msg, "PHP Notice") || contains(msg, "PHP Deprecated") {
  .level = "notice"
} else {
  .level = "info"
}
.source_type = "php_fpm"
.service = "wordpress"
'''

# ── SINK: VictoriaLogs (ES bulk API) ────────────────────────

[sinks.victorialogs]
type = "elasticsearch"
inputs = [
  "nginx_access_parsed",
  "nginx_error_parsed",
  "modsec_parsed",
  "traefik_parsed",
  "php_parsed",
]
endpoints = ["http://victorialogs:9428/insert/elasticsearch/"]
mode = "bulk"
api_version = "v8"
compression = "gzip"
healthcheck.enabled = false

[sinks.victorialogs.query]
"_msg_field" = "message"
"_time_field" = "timestamp"
"_stream_fields" = "service,source_type"

[sinks.victorialogs.bulk]
index = "vector-{{ service }}"
